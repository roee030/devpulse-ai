<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { width: 260px; font-family: 'Syne', system-ui, sans-serif; background: #0d1117; color: #e6edf3; margin: 0; padding: 16px; }
  h1 { font-size: 13px; font-weight: 700; color: #2dd4bf; margin: 0 0 12px; letter-spacing: .05em; text-transform: uppercase; }
  .row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #21262d; }
  .label { color: #8b949e; }
  .val { font-weight: 600; color: #e6edf3; font-variant-numeric: tabular-nums; }
  .status { margin-top: 12px; font-size: 11px; color: #8b949e; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #2dd4bf; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .err { color: #f85149; }
</style>
</head>
<body>
<h1>DevPulse · AI Effort</h1>
<div id="content"><p class="status">Loading…</p></div>
<script src="popup.js"></script>
</body>
</html>
