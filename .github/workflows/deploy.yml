name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: rm -f package-lock.json && npm install

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_DATA_PROVIDER: mock
          VITE_UNIFIED_API_KEY: ${{ secrets.VITE_UNIFIED_API_KEY }}
          VITE_UNIFIED_WORKSPACE_ID: ${{ secrets.VITE_UNIFIED_WORKSPACE_ID }}
          VITE_UNIFIED_JIRA_CONNECTION_ID: ${{ secrets.VITE_UNIFIED_JIRA_CONNECTION_ID }}
          VITE_UNIFIED_LINEAR_CONNECTION_ID: ${{ secrets.VITE_UNIFIED_LINEAR_CONNECTION_ID }}
          VITE_UNIFIED_MONDAY_CONNECTION_ID: ${{ secrets.VITE_UNIFIED_MONDAY_CONNECTION_ID }}
          VITE_UNIFIED_GITHUB_CONNECTION_ID: ${{ secrets.VITE_UNIFIED_GITHUB_CONNECTION_ID }}
          VITE_UNIFIED_SLACK_CONNECTION_ID: ${{ secrets.VITE_UNIFIED_SLACK_CONNECTION_ID }}
          VITE_UNIFIED_TEAMS_CONNECTION_ID: ${{ secrets.VITE_UNIFIED_TEAMS_CONNECTION_ID }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
