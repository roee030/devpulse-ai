name: E2E Tests

on:
  push:
    branches: [main, master, claude/**]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed all platforms via Unified.to
        run: npx tsx scripts/seed-sandbox.ts
        env:
          UNIFIED_API_KEY: ${{ secrets.UNIFIED_API_KEY }}
          UNIFIED_JIRA_CONNECTION_ID: ${{ secrets.UNIFIED_JIRA_CONNECTION_ID }}
          UNIFIED_LINEAR_CONNECTION_ID: ${{ secrets.UNIFIED_LINEAR_CONNECTION_ID }}
          UNIFIED_MONDAY_CONNECTION_ID: ${{ secrets.UNIFIED_MONDAY_CONNECTION_ID }}
          UNIFIED_GITHUB_CONNECTION_ID: ${{ secrets.UNIFIED_GITHUB_CONNECTION_ID }}
          UNIFIED_SLACK_CONNECTION_ID: ${{ secrets.UNIFIED_SLACK_CONNECTION_ID }}
          UNIFIED_TEAMS_CONNECTION_ID: ${{ secrets.UNIFIED_TEAMS_CONNECTION_ID }}
        continue-on-error: true

      - name: Run Company Simulation (14 days)
        run: npx tsx scripts/simulate-company.ts
        env:
          UNIFIED_API_KEY: ${{ secrets.UNIFIED_API_KEY }}
          UNIFIED_JIRA_CONNECTION_ID: ${{ secrets.UNIFIED_JIRA_CONNECTION_ID }}
          UNIFIED_GITHUB_CONNECTION_ID: ${{ secrets.UNIFIED_GITHUB_CONNECTION_ID }}
          UNIFIED_SLACK_CONNECTION_ID: ${{ secrets.UNIFIED_SLACK_CONNECTION_ID }}
          SIM_JIRA_USER_CTO:  ${{ secrets.SIM_JIRA_USER_CTO }}
          SIM_JIRA_USER_DIV:  ${{ secrets.SIM_JIRA_USER_DIV }}
          SIM_JIRA_USER_LEAD: ${{ secrets.SIM_JIRA_USER_LEAD }}
          SIM_JIRA_USER_DEV1: ${{ secrets.SIM_JIRA_USER_DEV1 }}
          SIM_JIRA_USER_DEV2: ${{ secrets.SIM_JIRA_USER_DEV2 }}
          SIM_JIRA_USER_DEV3: ${{ secrets.SIM_JIRA_USER_DEV3 }}
          SIM_GITHUB_USER_CTO:  ${{ secrets.SIM_GITHUB_USER_CTO }}
          SIM_GITHUB_USER_DIV:  ${{ secrets.SIM_GITHUB_USER_DIV }}
          SIM_GITHUB_USER_LEAD: ${{ secrets.SIM_GITHUB_USER_LEAD }}
          SIM_GITHUB_USER_DEV1: ${{ secrets.SIM_GITHUB_USER_DEV1 }}
          SIM_GITHUB_USER_DEV2: ${{ secrets.SIM_GITHUB_USER_DEV2 }}
          SIM_GITHUB_USER_DEV3: ${{ secrets.SIM_GITHUB_USER_DEV3 }}
          SIM_SLACK_USER_CTO:  ${{ secrets.SIM_SLACK_USER_CTO }}
          SIM_SLACK_USER_DIV:  ${{ secrets.SIM_SLACK_USER_DIV }}
          SIM_SLACK_USER_LEAD: ${{ secrets.SIM_SLACK_USER_LEAD }}
          SIM_SLACK_USER_DEV1: ${{ secrets.SIM_SLACK_USER_DEV1 }}
          SIM_SLACK_USER_DEV2: ${{ secrets.SIM_SLACK_USER_DEV2 }}
          SIM_SLACK_USER_DEV3: ${{ secrets.SIM_SLACK_USER_DEV3 }}
        continue-on-error: true

      - name: Run Playwright E2E tests (all platforms × all scenarios)
        run: npx playwright test tests/e2e/scenarios.spec.ts
        env:
          CI: true
          UNIFIED_API_KEY: ${{ secrets.UNIFIED_API_KEY }}
          UNIFIED_JIRA_CONNECTION_ID: ${{ secrets.UNIFIED_JIRA_CONNECTION_ID }}
          UNIFIED_LINEAR_CONNECTION_ID: ${{ secrets.UNIFIED_LINEAR_CONNECTION_ID }}
          UNIFIED_MONDAY_CONNECTION_ID: ${{ secrets.UNIFIED_MONDAY_CONNECTION_ID }}
          UNIFIED_SLACK_CONNECTION_ID: ${{ secrets.UNIFIED_SLACK_CONNECTION_ID }}
          UNIFIED_TEAMS_CONNECTION_ID: ${{ secrets.UNIFIED_TEAMS_CONNECTION_ID }}

      - name: Verify Simulation Results
        run: npx playwright test tests/e2e/simulation-verify.spec.ts
        env:
          CI: true
          UNIFIED_API_KEY: ${{ secrets.UNIFIED_API_KEY }}
          UNIFIED_JIRA_CONNECTION_ID: ${{ secrets.UNIFIED_JIRA_CONNECTION_ID }}
          UNIFIED_SLACK_CONNECTION_ID: ${{ secrets.UNIFIED_SLACK_CONNECTION_ID }}

      - name: Upload HTML report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
