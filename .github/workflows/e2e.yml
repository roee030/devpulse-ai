name: E2E Tests

on:
  push:
    branches: [main, master, claude/**]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed sandbox data
        run: npx ts-node scripts/seed-sandbox.ts
        env:
          JIRA_SANDBOX_URL: ${{ secrets.JIRA_SANDBOX_URL }}
          GITHUB_SANDBOX_URL: ${{ secrets.GITHUB_SANDBOX_URL }}
          SLACK_SANDBOX_URL: ${{ secrets.SLACK_SANDBOX_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_API_TOKEN }}
          SLACK_API_TOKEN: ${{ secrets.SLACK_API_TOKEN }}
        continue-on-error: true

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload HTML report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
