name: E2E Tests

on:
  push:
    branches: [main, master, claude/**]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed all platforms via Unified.to
        run: npx tsx scripts/seed-sandbox.ts
        env:
          UNIFIED_API_KEY: ${{ secrets.UNIFIED_API_KEY }}
          UNIFIED_JIRA_CONNECTION_ID: ${{ secrets.UNIFIED_JIRA_CONNECTION_ID }}
          UNIFIED_LINEAR_CONNECTION_ID: ${{ secrets.UNIFIED_LINEAR_CONNECTION_ID }}
          UNIFIED_MONDAY_CONNECTION_ID: ${{ secrets.UNIFIED_MONDAY_CONNECTION_ID }}
          UNIFIED_SLACK_CONNECTION_ID: ${{ secrets.UNIFIED_SLACK_CONNECTION_ID }}
          UNIFIED_TEAMS_CONNECTION_ID: ${{ secrets.UNIFIED_TEAMS_CONNECTION_ID }}
        continue-on-error: true

      - name: Run Playwright E2E tests (all platforms × all scenarios)
        run: npx playwright test
        env:
          CI: true
          UNIFIED_API_KEY: ${{ secrets.UNIFIED_API_KEY }}
          UNIFIED_JIRA_CONNECTION_ID: ${{ secrets.UNIFIED_JIRA_CONNECTION_ID }}
          UNIFIED_LINEAR_CONNECTION_ID: ${{ secrets.UNIFIED_LINEAR_CONNECTION_ID }}
          UNIFIED_MONDAY_CONNECTION_ID: ${{ secrets.UNIFIED_MONDAY_CONNECTION_ID }}
          UNIFIED_SLACK_CONNECTION_ID: ${{ secrets.UNIFIED_SLACK_CONNECTION_ID }}
          UNIFIED_TEAMS_CONNECTION_ID: ${{ secrets.UNIFIED_TEAMS_CONNECTION_ID }}

      - name: Upload HTML report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
